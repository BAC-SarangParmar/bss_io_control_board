<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping Configuration</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
        var ajaxList = [];

        function newAJAXCommand(url, callback, repeat, data) {
            var newAjax = new Object();
            var theTimer = new Date();
            newAjax.url = url;
            newAjax.repeat = repeat;
            newAjax.ajaxReq = null;

            if (window.XMLHttpRequest) {
                newAjax.ajaxReq = new XMLHttpRequest();
                newAjax.ajaxReq.onreadystatechange = function () {
                    if (newAjax.ajaxReq.readyState === 4 && newAjax.ajaxReq.status === 200) {
                        if (callback) {
                            callback(newAjax.ajaxReq.responseXML || newAjax.ajaxReq.responseText);
                        }
                    }
                };
                newAjax.ajaxReq.open((data == null) ? "GET" : "POST", newAjax.url, true);
                newAjax.ajaxReq.send(data);
            } else if (window.ActiveXObject) {
                newAjax.ajaxReq = new ActiveXObject("Microsoft.XMLHTTP");
                if (newAjax.ajaxReq) {
                    newAjax.ajaxReq.onreadystatechange = function () {
                        if (newAjax.ajaxReq.readyState === 4 && newAjax.ajaxReq.status === 200) {
                            if (callback) {
                                callback(newAjax.ajaxReq.responseXML || newAjax.ajaxReq.responseText);
                            }
                        }
                    };
                    newAjax.ajaxReq.open((data == null) ? "GET" : "POST", newAjax.url, true);
                    newAjax.ajaxReq.send(data);
                }
            }

            newAjax.lastCalled = theTimer.getTime();
            ajaxList.push(newAjax);
        }

        function getXMLValue(xmlData, tagName) {
            const tag = xmlData.getElementsByTagName(tagName)[0];
            return tag ? tag.textContent || tag.innerText : "";
        }

        function submitMapping() {
            var mappingTable = document.getElementById("mappingTable").getElementsByTagName("tbody")[0];
            var rows = mappingTable.rows;

            // Check if the mapping table is empty
            if (rows.length === 0) {
                alert("Error: There is no configuration to submit.");
                return;  // Stop the submission if no configurations are present
            }

            var mappingData = [];

            for (var i = 0; i < rows.length; i++) {
                var type = rows[i].cells[0].innerHTML;
                var interfaceValue = rows[i].cells[1].innerHTML;
                var tcpPort = rows[i].cells[2].innerHTML;
                mappingData.push({ type, interface: interfaceValue, tcpPort });
            }

            var url = 'mapping.cgi';
            newAJAXCommand(url, null, false, JSON.stringify({ mapping: mappingData }));
            alert('Mapping configuration submitted to server!');
        }

        function toggleInterfaceOptions() {
            var type = document.getElementById("type").value;
            var canOptions = document.getElementById("canOptions");
            var uartOptions = document.getElementById("uartOptions");

            if (type === "CAN") {
                canOptions.classList.remove("hidden");
                uartOptions.classList.add("hidden");
            } else if (type === "RS485") {
                uartOptions.classList.remove("hidden");
                canOptions.classList.add("hidden");
            }
        }
        window.onload = function () {
            toggleInterfaceOptions();
            removeDefaultMappedOptions();

            // Fetch and process the XML file
            newAJAXCommand('mappingstatus.xml', function (response) {
                // Parse the <mapping> data
                const mappingData = JSON.parse(getXMLValue(response, 'mapping'));

                const tbody = document.querySelector("#mappingTable tbody");

                // Render the mapping data into the table
                mappingData.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                <td>${row.type}</td>
                <td>${row.interface}</td>
                <td>${row.tcpPort}</td>
                <td><button onclick="removeRow(this, '${row.type}', '${row.interface}')">Remove</button></td>
            `;
                    tbody.appendChild(tr);

                    // Remove the option from the relevant select dropdown
                    removeOptionFromSelect(row.type, row.interface);
                });
            }, false);
        };

        //         window.onload = function () {
        //             toggleInterfaceOptions();
        //             removeDefaultMappedOptions();
        //             newAJAXCommand('configstatus.xml', function(xml) {
        //     const data = JSON.parse(getXMLValue(xml, 'mapping'));
        //     const tbody = document.querySelector("#mappingTable tbody");

        //     // Clear any previous rows
        //     tbody.innerHTML = "";

        //     data.forEach(item => {
        //         const tr = document.createElement("tr");
        //         tr.innerHTML = `<td>${item.type}</td><td>${item.interface}</td><td>${item.tcpPort}</td><td><button onclick="removeRow(this, '${item.type}', '${item.interface}')">Remove</button></td>`;
        //         tbody.appendChild(tr);
        //         removeOptionFromSelect(item.type, item.interface);
        //     });
        // }, false);


        //         };

        function removeDefaultMappedOptions() {
            var table = document.getElementById('mappingTable').getElementsByTagName('tbody')[0];
            var rows = table.getElementsByTagName('tr');

            // Iterate over existing rows and remove the options from the select lists
            for (var i = 0; i < rows.length; i++) {
                var type = rows[i].cells[0].innerHTML;
                var interfaceValue = rows[i].cells[1].innerHTML;

                removeOptionFromSelect(type, interfaceValue);
            }
        }

        function addMapping() {
            var type = document.getElementById('type').value;
            var interfaceValue = type === 'CAN' ? document.getElementById('canInterface').value : document.getElementById('uartInterface').value;
            var tcpPort = document.getElementById('tcpPort').value;

            // Validation: Ensure interface and port are not empty
            if (!interfaceValue || tcpPort.trim() === '') {
                alert("Please select a valid interface and enter a valid TCP port.");
                return;
            }

            // Check if the interface already exists in the table
            if (isInterfaceAlreadyInTable(type, interfaceValue)) {
                alert(`${interfaceValue} is already added to the table.`);
                return;
            }

            var table = document.getElementById('mappingTable').getElementsByTagName('tbody')[0];
            var newRow = table.insertRow();

            newRow.innerHTML = `<td>${type}</td><td>${interfaceValue}</td><td>${tcpPort}</td><td><button onclick="removeRow(this, '${type}', '${interfaceValue}')">Remove</button></td>`;

            // Remove the selected option from the relevant select list
            removeOptionFromSelect(type, interfaceValue);

            // Reset the selection index for both CAN and UART dropdowns to the first option
            document.getElementById('canInterface').selectedIndex = 0;
            document.getElementById('uartInterface').selectedIndex = 0;

            // Reset the TCP port field to empty
            document.getElementById('tcpPort').value = '';
        }

        function removeRow(button, type, interfaceValue) {
            var row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);

            // Check if the interface still exists in the table; if not, add it back to the select list
            if (!isInterfaceAlreadyInTable(type, interfaceValue)) {
                addOptionToSelect(type, interfaceValue);
            }
        }

        function isInterfaceAlreadyInTable(type, interfaceValue) {
            var table = document.getElementById('mappingTable').getElementsByTagName('tbody')[0];
            var rows = table.getElementsByTagName('tr');

            for (var i = 0; i < rows.length; i++) {
                var rowType = rows[i].cells[0].innerHTML;
                var rowInterface = rows[i].cells[1].innerHTML;

                if (rowType === type && rowInterface === interfaceValue) {
                    return true;
                }
            }
            return false;
        }

        function removeOptionFromSelect(type, interfaceValue) {
            var selectElement = (type === 'CAN') ? document.getElementById('canInterface') : document.getElementById('uartInterface');
            var options = selectElement.options;

            for (var i = 0; i < options.length; i++) {
                if (options[i].value === interfaceValue) {
                    selectElement.remove(i);
                    break;
                }
            }
        }

        function addOptionToSelect(type, interfaceValue) {
            var selectElement = (type === 'CAN') ? document.getElementById('canInterface') : document.getElementById('uartInterface');
            var newOption = document.createElement("option");
            newOption.value = interfaceValue;
            newOption.text = interfaceValue;
            selectElement.add(newOption);

            sortSelectOptions(selectElement);
        }

        function sortSelectOptions(selectElement) {
            var options = Array.from(selectElement.options);

            // Separate the "Select CAN" option from the rest
            var defaultOption = options.find(option => option.value === "");
            var otherOptions = options.filter(option => option.value !== "");

            // Sort the other options based on their text content
            otherOptions.sort((a, b) => a.text.localeCompare(b.text, undefined, { numeric: true }));

            // Clear the existing options and re-add them in sorted order
            selectElement.innerHTML = "";

            // Add the "Select CAN" option back at the top
            if (defaultOption) {
                selectElement.add(defaultOption);
            }

            // Add the sorted options
            otherOptions.forEach(option => selectElement.add(option));
        }
    </script>
</head>

<body>
    <!-- Header with Navigation Bar -->
    <div class="header">
        <img src="bacancy.png" alt="Bacancy" style="position:absolute; left:20px;">
        <span class="title">IO Aggregator Configuration</span>
        <img src="sunmobility.png" alt="SunMobility" style="position:absolute; right:20px;">
        <div class="spacer" style="height:5px;"></div>
        <nav>
            <ul>
                <li><a href="index.htm">Mapping Config</a></li>
                <li><a href="rs485.htm">RS485 Config</a></li>
                <li><a href="can.htm">CAN Config</a></li>
            </ul>
        </nav>
    </div>

    <!-- Mapping Configuration Section -->
    <div class="container">
        <div class="section">
            <h2>Add Mapping</h2>
            <form>
                <label for="type">Type:</label>
                <select id="type" name="type" onchange="toggleInterfaceOptions()">
                    <option value="CAN">CAN</option>
                    <option value="RS485">RS485</option>
                </select>
                <br><br>

                <div id="canOptions">
                    <label for="canInterface">CAN Interface:</label>
                    <select id="canInterface" name="canInterface">
                        <option value="" disabled selected>Select CAN</option>
                        <option value="CAN1">CAN1</option>
                        <option value="CAN2">CAN2</option>
                        <option value="CAN3">CAN3</option>
                        <option value="CAN4">CAN4</option>
                        <option value="CAN5">CAN5</option>
                        <option value="CAN6">CAN6</option>
                    </select>
                    <br><br>
                </div>

                <div id="uartOptions" class="hidden">
                    <label for="uartInterface">RS485 Interface:</label>
                    <select id="uartInterface" name="uartInterface">
                        <option value="" disabled selected>Select RS485</option>
                        <option value="RS485_1">RS485_1</option>
                        <option value="RS485_2">RS485_2</option>
                    </select>
                    <br><br>
                </div>

                <label for="tcpPort">TCP Port:</label>
                <input type="number" id="tcpPort" name="tcpPort" placeholder="Enter TCP port" min="1" max="65535"
                    required>
                <span id="error-msg" style="color: red; display: none;">Port must be between 1024 and 65535.</span>
                <br><br>

                <script>
                    document.getElementById("tcpPort").addEventListener("blur", function () {
                        let input = parseInt(this.value, 10);
                        let errorMsg = document.getElementById("error-msg");

                        if (isNaN(input) || input < 1024 || input > 65535) {
                            errorMsg.style.display = "inline";
                            this.value = ""; // Clear input only when the user leaves the field
                        } else {
                            errorMsg.style.display = "none";
                        }
                    });

                </script>

                <button type="button" onclick="addMapping()">Add Mapping</button>
            </form>
        </div>

        <div class="section">
            <h2>Mapping Table</h2>
            <table id="mappingTable">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Interface</th>
                        <th>TCP Port</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Default rows -->
                    <!-- <tr>
                        <td>CAN</td>
                        <td>CAN1</td>
                        <td>5001</td>
                        <td><button onclick="removeRow(this, 'CAN', 'CAN1')">Remove</button></td>
                    </tr>
                    <tr>
                        <td>RS485</td>
                        <td>RS485_1</td>
                        <td>6001</td>
                        <td><button onclick="removeRow(this, 'RS485_1', 'RS485_1')">Remove</button></td>
                    </tr> -->
                </tbody>
            </table>
            <br>
            <button type="button" onclick="submitMapping()">Submit Mapping</button>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer">Copyright &copy; 2025 Bacancy Systems LLP. All Rights Reserved.</div>
</body>

</html>
