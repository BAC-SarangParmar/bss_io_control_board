<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS485 Configuration</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
        var ajaxList = [];

        function newAJAXCommand(url, callback, repeat, data) {
    var newAjax = new Object();
    var theTimer = new Date();
    newAjax.url = url;
    newAjax.repeat = repeat;
    newAjax.ajaxReq = null;

    if (window.XMLHttpRequest) {
        newAjax.ajaxReq = new XMLHttpRequest();
        newAjax.ajaxReq.onreadystatechange = function () {
            if (newAjax.ajaxReq.readyState === 4 && newAjax.ajaxReq.status === 200) {
                if (callback) {
                    callback(newAjax.ajaxReq.responseXML || newAjax.ajaxReq.responseText);
                }
            }
        };
        newAjax.ajaxReq.open((data == null) ? "GET" : "POST", newAjax.url, true);
        newAjax.ajaxReq.send(data);
    } else if (window.ActiveXObject) {
        newAjax.ajaxReq = new ActiveXObject("Microsoft.XMLHTTP");
        if (newAjax.ajaxReq) {
            newAjax.ajaxReq.onreadystatechange = function () {
                if (newAjax.ajaxReq.readyState === 4 && newAjax.ajaxReq.status === 200) {
                    if (callback) {
                        callback(newAjax.ajaxReq.responseXML || newAjax.ajaxReq.responseText);
                    }
                }
            };
            newAjax.ajaxReq.open((data == null) ? "GET" : "POST", newAjax.url, true);
            newAjax.ajaxReq.send(data);
        }
    }

    newAjax.lastCalled = theTimer.getTime();
    ajaxList.push(newAjax);
}

        function getXMLValue(xmlData, tagName) {
    const tag = xmlData.getElementsByTagName(tagName)[0];
    return tag ? tag.textContent || tag.innerText : "";
}

        function submitUARTConfig() {
            var uartConfigTable = document.getElementById("uartConfigTable").getElementsByTagName("tbody")[0];
            var rows = uartConfigTable.rows;
            var uartData = [];
			// Check if the mapping table is empty
			if (rows.length === 0) {
				alert("Error: There is no configuration to submit.");
				return;  // Stop the submission if no configurations are present
			}
            for (var i = 0; i < rows.length; i++) {
                var uart = rows[i].cells[0].innerHTML;
                var baudRate = rows[i].cells[1].innerHTML;
                var dataBits = rows[i].cells[2].innerHTML;
                var parity = rows[i].cells[3].innerHTML;
                var stopBits = rows[i].cells[4].innerHTML;
                uartData.push({ uart, baudRate, dataBits, parity, stopBits });
            }

            var url = 'uartconfig.cgi';
            newAJAXCommand(url, null, false, JSON.stringify({ uartConfig: uartData }));
            alert('RS485 configuration submitted to server!');
        }

        function addUARTConfig() {
            var uartSelect = document.getElementById('uart');
            var uart = uartSelect.value;

            // Check if a valid UART option is selected
            if (uart === "") {
                alert("Please select a valid RS485 option.");
                return;
            }

            var baudRate = document.getElementById('baudRate').value;
            var dataBits = document.getElementById('dataBits').value;
            var parity = document.getElementById('parity').value;
            var stopBits = document.getElementById('stopBits').value;

            // Check for duplicates
            var uartConfigTable = document.getElementById("uartConfigTable").getElementsByTagName("tbody")[0];
            for (var i = 0; i < uartConfigTable.rows.length; i++) {
                if (uartConfigTable.rows[i].cells[0].innerHTML === uart) {
                    alert("This RS485 configuration already exists.");
                    return;
                }
            }

            var table = document.getElementById('uartConfigTable').getElementsByTagName('tbody')[0];
            var newRow = table.insertRow();
            newRow.innerHTML = `<td>${uart}</td><td>${baudRate}</td><td>${dataBits}</td><td>${parity}</td><td>${stopBits}</td><td><button onclick="removeRow(this)">Remove</button></td>`;

            // Update UART options
            updateUARTOptions();

            // Reset the dropdown to "Select UART"
            uartSelect.selectedIndex = 0; // Reset to the first option ("Select UART")
        }

        function removeRow(button) {
            var row = button.parentNode.parentNode;
            var uart = row.cells[0].innerHTML; // Get the UART value
            row.parentNode.removeChild(row);
            updateUARTOptions(); // Update options after removal
        }

        function updateUARTOptions() {
            var uartSelect = document.getElementById('uart');
            var options = uartSelect.getElementsByTagName('option');

            // Show all options first
            for (var i = 0; i < options.length; i++) {
                options[i].style.display = 'block';
            }

            // Hide options that are already in the table
            var uartConfigTable = document.getElementById("uartConfigTable").getElementsByTagName("tbody")[0];
            for (var i = 0; i < uartConfigTable.rows.length; i++) {
                var uartInTable = uartConfigTable.rows[i].cells[0].innerHTML;
                for (var j = 0; j < options.length; j++) {
                    if (options[j].value === uartInTable) {
                        options[j].style.display = 'none'; // Hide the option
                        break; // No need to check further
                    }
                }
            }
        }
        

        window.onload = function () {
    updateUARTOptions();

    // Fetch and process the XML file
    newAJAXCommand('rs485status.xml', function (response) {
        // Parse the <rs485> data
        const data = JSON.parse(getXMLValue(response, 'rs485'));
        const tbody = document.querySelector("#uartConfigTable tbody");

        // Render the RS485 data into the table
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row.uart}</td>
                <td>${row.baudRate}</td>
                <td>${row.dataBits}</td>
                <td>${row.parity}</td>
                <td>${row.stopBits}</td>
                <td><button onclick="removeRow(this)">Remove</button></td>
            `;
            tbody.appendChild(tr);
        });

        // Update the UART options to reflect the current table state
        updateUARTOptions();
    }, false);
};
    </script>	
</head>
<body>
    <!-- Header with Navigation Bar -->
    <div class="header">
        <img src="bacancy.png" alt="Bacancy" style="position:absolute; left:20px;">
        <span class="title">IO Aggregator Configuration</span>
        <img src="sunmobility.png" alt="SunMobility" style="position:absolute; right:20px;">
        <div class="spacer" style="height:5px;"></div>
        <nav>
            <ul>
                <li><a href="index.htm">Mapping Config</a></li>
                <li><a href="rs485.htm">RS485 Config</a></li>
                <li><a href="can.htm">CAN Config</a></li>
            </ul>
        </nav>
    </div>

    <!-- UART Configuration Section -->
    <div class="container">
        <div class="section">
            <h2>RS485 Configuration</h2>
            <form>
                <label for="uart">RS485:</label>
                <select id="uart" name="uart">
                    <option value="" disabled selected>Select RS485</option>
                    <option value="RS485_1">RS485_1</option>
                    <option value="RS485_2">RS485_2</option>
                </select>
                <br><br>

                <label for="baudRate">Baud Rate:</label>
                <select id="baudRate" name="baudRate">
                    <option value="9600">9600</option>
                    <option value="19200">19200</option>
                    <option value="57600">57600</option>
                    <option value="115200">115200</option>
                </select>
                <br><br>

                <label for="dataBits">Data Bits:</label>
                <select id="dataBits" name="dataBits">
                    <!-- <option value="5">5</option>
                    <option value="6">6</option> -->
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
                <br><br>

                <label for="parity">Parity:</label>
                <select id="parity" name="parity">
                    <option value="None">None</option>
                    <option value="Even">Even</option>
                    <option value="Odd">Odd</option>
                </select>
                <br><br>

                <label for="stopBits">Stop Bits:</label>
                <select id="stopBits" name="stopBits">
                    <option value="1">1</option>
                    <option value="2">2</option>
                </select>
                <br><br>

                <button type="button" onclick="addUARTConfig()">Add RS485 Config</button>
            </form>
        </div>

        <div class="section">
            <h2>RS485 Configuration Table</h2>
            <table id="uartConfigTable">
                <thead>
                    <tr>
                        <th>RS485</th>
                        <th>Baud Rate</th>
                        <th>Data Bits</th>
                        <th>Parity</th>
                        <th>Stop Bits</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Default rows can be added here -->
                    <!-- <tr>
                        <td>RS485_1</td>
                        <td>9600</td>
                        <td>8</td>
                        <td>None</td>
                        <td>1</td>
                        <td><button onclick="removeRow(this)">Remove</button></td>
                    </tr>
                    <tr>
                        <td>RS485_2</td>
                        <td>9600</td>
                        <td>8</td>
                        <td>None</td>
                        <td>1</td>
                        <td><button onclick="removeRow(this)">Remove</button></td>
                    </tr>				 -->
                </tbody>
            </table>
            <br>
            <button type="button" onclick="submitUARTConfig()">Submit RS485 Config</button>
        </div>
    </div>
